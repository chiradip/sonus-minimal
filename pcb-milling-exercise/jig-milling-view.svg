<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="Helvetica, Arial, sans-serif">
  <style>
    text{font-family:Helvetica,Arial,sans-serif;fill:#1a1a1a}
    .ref{font-size:12px;font-weight:700;fill:#0d47a1}
    .note{font-size:13px;fill:#455a64}
    .ttl{font-size:22px;font-weight:700;fill:#123a5f}
    .warn{font-size:13px;font-weight:700;fill:#b71c1c}
    .stock{fill:#f7ead7;stroke:#37474f;stroke-width:2.5}
    .iso{fill:none;stroke:#c62828;stroke-width:2}
    .cut{fill:none;stroke:#1565c0;stroke-width:2.4;stroke-dasharray:10 6}
    .tab{stroke:#2e7d32;stroke-width:7}
  </style>
  <rect width="1080" height="720" fill="#fff"/>
  <text x="60" y="40" class="ttl">JIG-1 — as-machined view (copper side UP — G-code coordinates, already mirrored)</text>
  <text x="60" y="62" class="note">This is what you see on the Carvera bed. X0 Y0 = bottom-left of the blank, Z0 = top of copper. Do NOT mirror anything again.</text>

  <!-- stock -->
  <rect x="100" y="140" width="560" height="320" class="stock"/>

  <!-- origin + axes -->
  <circle cx="100" cy="460" r="6" fill="#b71c1c"/>
  <path d="M100,460 L180,460" stroke="#b71c1c" stroke-width="2.4"/><polygon points="180,455 192,460 180,465" fill="#b71c1c"/>
  <text x="196" y="466" class="ref" fill="#b71c1c">+X</text>
  <path d="M100,460 L100,380" stroke="#b71c1c" stroke-width="2.4"/><polygon points="95,380 100,368 105,380" fill="#b71c1c"/>
  <text x="92" y="360" class="ref" fill="#b71c1c">+Y</text>
  <text x="112" y="482" class="ref" fill="#b71c1c">X0 Y0 (Z0 = copper top)</text>

  <!-- isolation toolpaths (mirrored islands): VIN+ -> (54..66, 19..29); DG -> (6..16, 10..29) -->
  <rect class="iso" x="530.8" y="226.8" width="102.4" height="86.4"/>
  <rect class="iso" x="528.8" y="224.8" width="106.4" height="90.4"/>
  <text x="582" y="214" class="ref" fill="#c62828" text-anchor="middle">VIN+ island (2 passes)</text>
  <rect class="iso" x="146.8" y="226.8" width="86.4" height="158.4"/>
  <rect class="iso" x="144.8" y="224.8" width="90.4" height="162.4"/>
  <text x="190" y="214" class="ref" fill="#c62828" text-anchor="middle">DG island (2 passes)</text>

  <!-- drills (machine coords: x_m = 70 - x_design) -->
  <!-- 1.2: (62,24),(8,24) -->
  <circle cx="596" cy="268" r="6" fill="#6a1b9a"/><circle cx="164" cy="268" r="6" fill="#6a1b9a"/>
  <!-- 1.6: (58,27)?(no) values: VIN+(12,27)->58 ; VIN-(12,12)->58 ; SRC(44,12)->26 ; DRAIN(58,13)->12 ; GATE(62,13)->8 -->
  <circle cx="564" cy="244" r="7.5" fill="#e65100"/>
  <circle cx="564" cy="364" r="7.5" fill="#e65100"/>
  <circle cx="308" cy="364" r="7.5" fill="#e65100"/>
  <circle cx="196" cy="356" r="7.5" fill="#e65100"/>
  <circle cx="164" cy="356" r="7.5" fill="#e65100"/>
  <!-- 1.0: TP (59,19)->11 ; (59,16)->11 ; (26,12)->44 ; (30,12)->40 -->
  <circle cx="188" cy="308" r="5" fill="#00695c"/><circle cx="188" cy="332" r="5" fill="#00695c"/>
  <circle cx="452" cy="364" r="5" fill="#00695c"/><circle cx="420" cy="364" r="5" fill="#00695c"/>
  <!-- 3.2 M3: (65,5)->5 ; (5,5)->65 ; (65,35)->5 ; (5,35)->65 : px x=140/620 -->
  <circle cx="140" cy="420" r="12" fill="none" stroke="#37474f" stroke-width="2.4"/>
  <circle cx="620" cy="420" r="12" fill="none" stroke="#37474f" stroke-width="2.4"/>
  <circle cx="140" cy="180" r="12" fill="none" stroke="#37474f" stroke-width="2.4"/>
  <circle cx="620" cy="180" r="12" fill="none" stroke="#37474f" stroke-width="2.4"/>

  <!-- cutout + tabs at bottom(35,0) right(70,20) top(35,40) left(0,20) -->
  <rect class="cut" x="100" y="140" width="560" height="320"/>
  <path class="tab" d="M364,460 h32"/>
  <path class="tab" d="M660,284 v32"/>
  <path class="tab" d="M364,140 h32"/>
  <path class="tab" d="M100,284 v32"/>
  <text x="380" y="500" class="ref" fill="#2e7d32" text-anchor="middle">4 tabs, 4 mm wide, ~0.6 mm thick — saw + file after milling</text>

  <!-- legend / run order -->
  <rect x="720" y="120" width="320" height="360" rx="9" fill="#f5f7fa" stroke="#b0bec5"/>
  <text x="738" y="148" class="ref" font-size="14">Run order (one file per tool)</text>
  <path d="M738,168 h26" class="iso"/><text x="774" y="173" class="note">1&#8201;&#8201;01-isolation-vbit.nc — 30&#176; V-bit</text>
  <circle cx="750" cy="196" r="5" fill="#00695c"/><text x="774" y="201" class="note">2&#8201;&#8201;02-drill-1p0mm.nc — TP loops</text>
  <circle cx="750" cy="224" r="6" fill="#6a1b9a"/><text x="774" y="229" class="note">3&#8201;&#8201;03-drill-1p2mm.nc — R_j leads</text>
  <circle cx="750" cy="252" r="7.5" fill="#e65100"/><text x="774" y="257" class="note">4&#8201;&#8201;04-drill-1p6mm.nc — wire pads</text>
  <circle cx="750" cy="280" r="10" fill="none" stroke="#37474f" stroke-width="2.2"/><text x="774" y="285" class="note">5&#8201;&#8201;05-drill-3p2mm.nc — M3</text>
  <path d="M738,308 h26" class="cut"/><text x="774" y="313" class="note">6&#8201;&#8201;06-cutout-2mm.nc — 2 mm endmill</text>
  <text x="738" y="348" class="note" font-size="12.5">Zero X/Y at blank bottom-left corner,</text>
  <text x="738" y="365" class="note" font-size="12.5">Z on the COPPER surface, once, then run</text>
  <text x="738" y="382" class="note" font-size="12.5">all six files against the same WCS.</text>
  <text x="738" y="406" class="warn" font-size="12.5">Before file 1: air-cut, then a corner test</text>
  <text x="738" y="423" class="warn" font-size="12.5">cut — measure the V-groove width</text>
  <text x="738" y="440" class="warn" font-size="12.5">(~0.2 mm) and adjust Z-0.20 if needed.</text>
  <text x="738" y="464" class="note" font-size="12.5">Feeds: iso 300 &#183; drill 60 &#183; cut 250 mm/min</text>

  <!-- notes -->
  <rect x="60" y="530" width="980" height="110" rx="9" fill="#f5f7fa" stroke="#b0bec5"/>
  <text x="76" y="556" class="note"><tspan font-weight="700">Stock:</tspan> single-sided FR4, 1.6 mm, cut a blank &#8805;80 &#215; 50 mm. Fix to spoilboard with double-sided tape or the tape+CA method; press flat — V-bit depth tracks board flatness 1:1.</text>
  <text x="76" y="576" class="note"><tspan font-weight="700">Spindle:</tspan> 12,000 rpm iso / 9,000 drills / 10,000 cutout. Passes: isolation Z&#8722;0.20 single depth; drills peck &#215;3 to Z&#8722;1.85; cutout 4 passes of 0.45 mm to Z&#8722;1.75.</text>
  <text x="76" y="596" class="note"><tspan font-weight="700">After milling:</tspan> vacuum FR4 dust (wear a mask), deburr with a fine pad, then buzz out: VIN+&#8596;DG (must be 0 &#937; ONLY through R_j once stuffed, open before), each island&#8596;sea = open.</text>
  <text x="76" y="620" class="warn">The G-code is pre-mirrored. If your CAM/sender offers a mirror option — leave it OFF.</text>

  <text x="60" y="676" font-size="13" fill="#37474f">SONUS MINIMAL &#183; pcb-milling-exercise &#183; JIG-1 rev A &#183; as-machined view &#183; 2026-07-05</text>
</svg>
