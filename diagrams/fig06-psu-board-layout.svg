<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 860" font-family="Helvetica, Arial, sans-serif">
  <style>
    text{font-family:Helvetica,Arial,sans-serif;fill:#1a1a1a}
    .ref{font-weight:700;font-size:14.5px;fill:#0d47a1}
    .val{font-size:12.5px;fill:#37474f}
    .note{font-size:13px;fill:#455a64}
    .ttl{font-size:23px;font-weight:700;fill:#123a5f}
    .warn{font-size:13px;font-weight:700;fill:#b71c1c}
    .pad{fill:#fff;stroke:#212121;stroke-width:2}
    .cmp{fill:#ffffff;stroke:#37474f;stroke-width:1.8}
    .dim{stroke:#78909c;stroke-width:1.3}
    .fly{stroke:#6a1b9a;stroke-width:1.8;stroke-dasharray:7 5;fill:none}
  </style>
  <defs>
    <pattern id="pb2" width="20.32" height="20.32" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1.4" fill="#c8d2d8"/></pattern>
    <marker id="ag2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2e7d32"/></marker>
    <marker id="ad2" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,4 L8,4 M4,0 L4,8" stroke="#78909c"/></marker>
  </defs>
  <rect width="1340" height="860" fill="#fff"/>
  <text x="60" y="44" class="ttl">Fig. 6 — PSU Board, perfboard placement map (one per amp)</text>
  <text x="60" y="67" class="note">110 &#215; 75 mm, 0.1&#8243; perfboard. The bridge rectifier is NOT on this board — it bolts to the chassis floor. Connectivity from Fig. 3.</text>

  <!-- dimensions -->
  <path class="dim" d="M120,132 H890" marker-start="url(#ad2)" marker-end="url(#ad2)"/>
  <text x="505" y="126" class="note" text-anchor="middle">110 mm</text>
  <path class="dim" d="M104,150 V675" marker-start="url(#ad2)" marker-end="url(#ad2)"/>
  <text x="96" y="415" class="note" text-anchor="end" transform="rotate(-90 96 415)">75 mm</text>

  <!-- board -->
  <rect x="120" y="150" width="770" height="525" rx="6" fill="#fbfcfd" stroke="#37474f" stroke-width="2.5"/>
  <rect x="120" y="150" width="770" height="525" rx="6" fill="url(#pb2)"/>

  <!-- off-board bridge -->
  <rect x="46" y="300" width="60" height="60" rx="5" fill="#f5f7fa" stroke="#37474f" stroke-width="2" stroke-dasharray="7 5"/>
  <circle cx="76" cy="330" r="6" fill="none" stroke="#37474f" stroke-width="1.6"/>
  <text x="76" y="384" class="val" text-anchor="middle">BR1</text>
  <text x="76" y="400" class="val" text-anchor="middle">on chassis</text>
  <path class="fly" d="M106,312 C118,300 122,270 132,246"/>
  <path class="fly" d="M106,348 C118,360 122,420 132,462"/>

  <!-- input pads -->
  <circle class="pad" cx="140" cy="235" r="8"/><text x="156" y="228" class="ref">RAW +</text>
  <circle class="pad" cx="140" cy="472" r="8"/><text x="156" y="466" class="ref">RAW &#8722;</text>

  <!-- reservoirs -->
  <circle class="cmp" cx="300" cy="330" r="85"/>
  <text x="300" y="318" class="ref" text-anchor="middle">C_res A</text>
  <text x="300" y="336" class="val" text-anchor="middle">10,000 &#181;F 50 V</text>
  <text x="300" y="354" class="val" text-anchor="middle">snap-in</text>
  <text x="238" y="252" font-size="17" font-weight="700" fill="#b71c1c">+</text>
  <circle class="cmp" cx="480" cy="330" r="85"/>
  <text x="480" y="318" class="ref" text-anchor="middle">C_res B</text>
  <text x="480" y="336" class="val" text-anchor="middle">10,000 &#181;F 50 V</text>
  <text x="480" y="354" class="val" text-anchor="middle">snap-in</text>
  <text x="418" y="252" font-size="17" font-weight="700" fill="#b71c1c">+</text>
  <text x="390" y="446" class="warn" text-anchor="middle">polarity kills — (+) marks face RAW+</text>

  <!-- star -->
  <circle cx="390" cy="560" r="10" fill="#212121"/>
  <path d="M300,415 L382,552 M480,415 L398,552 M148,478 L378,556" stroke="#2e7d32" stroke-width="2" fill="none" marker-end="url(#ag2)"/>
  <text x="390" y="596" class="ref" text-anchor="middle" fill="#1b5e20">STAR GROUND</text>
  <text x="390" y="614" class="note" text-anchor="middle">M4 bolt through the board &#183; every 0 V return lands here on ring lugs:</text>
  <text x="390" y="632" class="note" text-anchor="middle">C_res &#8722;&#215;2 &#183; RAW&#8722; &#183; C_cm&#8722; &#183; 0V-L &#183; 0V-R &#183; speaker returns &#183; ONE chassis bond</text>

  <!-- bleeder / multiplier -->
  <rect class="cmp" x="596" y="230" width="24" height="64" rx="3"/><text x="634" y="252" class="ref">R_bleed</text><text x="634" y="268" class="val">4.7 k 2 W</text>
  <rect class="cmp" x="596" y="360" width="24" height="64" rx="3"/><text x="634" y="382" class="ref">R_cm</text><text x="634" y="398" class="val">220 &#937; 2 W</text>
  <circle class="cmp" cx="742" cy="280" r="44"/>
  <text x="742" y="272" class="ref" text-anchor="middle">C_cm</text>
  <text x="742" y="290" class="val" text-anchor="middle">2200 &#181;F 50 V</text>
  <text x="700" y="216" font-size="17" font-weight="700" fill="#b71c1c">+</text>
  <rect class="cmp" x="700" y="380" width="40" height="54" rx="3"/>
  <text x="720" y="404" class="ref" text-anchor="middle" font-size="12.5">Q_d</text>
  <text x="720" y="420" class="val" text-anchor="middle">BD139</text>
  <rect class="cmp" x="790" y="374" width="48" height="66" rx="3"/>
  <path d="M790,384 H838" stroke="#78909c" stroke-width="4"/>
  <text x="814" y="406" class="ref" text-anchor="middle" font-size="12.5">Q_cm</text>
  <text x="814" y="422" class="val" text-anchor="middle">MJE15032</text>
  <rect class="cmp" x="690" y="490" width="56" height="20" rx="3"/><text x="718" y="528" class="val" text-anchor="middle">R_be 2.2 k</text>
  <rect class="cmp" x="780" y="490" width="60" height="20" rx="3"/><path d="M824,490 V510" stroke="#37474f" stroke-width="3"/>
  <text x="810" y="528" class="val" text-anchor="middle">D_p 1N5408</text>
  <text x="810" y="544" class="val" text-anchor="middle">band &#8594; RAW+</text>

  <!-- Q_cm heatsink -->
  <rect x="905" y="360" width="34" height="160" fill="#eceff1" stroke="#78909c" stroke-width="2"/>
  <path d="M939,372 h12 M939,398 h12 M939,424 h12 M939,450 h12 M939,476 h12 M939,502 h12" stroke="#78909c" stroke-width="4"/>
  <path class="fly" d="M838,398 C868,398 880,410 901,420"/>
  <text x="922" y="546" class="note" text-anchor="middle">Q_cm sink</text>
  <text x="922" y="562" class="note" text-anchor="middle">&#8776;5 &#176;C/W</text>
  <text x="922" y="578" class="note" text-anchor="middle">insulate tab!</text>

  <!-- output pads -->
  <circle class="pad" cx="875" cy="210" r="8"/><text x="858" y="200" class="ref" text-anchor="end">RAIL-L</text>
  <circle class="pad" cx="875" cy="256" r="8"/><text x="858" y="250" class="ref" text-anchor="end">RAIL-R</text>
  <circle class="pad" cx="875" cy="600" r="8"/><text x="858" y="594" class="ref" text-anchor="end">0V-L</text>
  <circle class="pad" cx="875" cy="646" r="8"/><text x="858" y="640" class="ref" text-anchor="end">0V-R</text>
  <text x="1000" y="216" class="note">one twisted pair per channel:</text>
  <text x="1000" y="234" class="note">RAIL-L + 0V-L &#183; RAIL-R + 0V-R</text>
  <text x="1000" y="252" class="note">(twist tightly, &#8776;3 turns/inch)</text>

  <!-- rules box -->
  <rect x="60" y="700" width="1220" height="86" rx="9" fill="#f5f7fa" stroke="#b0bec5"/>
  <text x="76" y="726" class="note"><tspan font-weight="700">Rules:</tspan> &#9312; snap-in caps: enlarge holes to 2 mm, solder short and stiff &#9313; the 2.8 A paths (RAW+ &#8594; caps &#8594; Q_cm collector, emitter &#8594; RAIL pads) are bus wire</text>
  <text x="76" y="748" class="note">&#9314; R_bleed spans RAW+ to star — mount it 2 mm proud, it dissipates &#8776;0.12 W continuously &#9315; keep C_cm right next to Q_d&#8217;s base pin &#9316; nothing else shares the star bolt&#8217;s ring-lug stack order:</text>
  <text x="76" y="770" class="note">lug stack from board up: C_res returns &#8594; RAW&#8722; &#8594; channel 0 V &#8594; speaker returns &#8594; chassis bond lug LAST (top)</text>

  <!-- title block -->
  <rect x="60" y="806" width="1220" height="34" fill="#fff" stroke="#37474f" stroke-width="1.6"/>
  <path d="M420,806 V840 M900,806 V840" stroke="#37474f" stroke-width="1.2"/>
  <text x="76" y="828" font-size="14" font-weight="700" fill="#123a5f">SONUS MINIMAL</text>
  <text x="436" y="828" font-size="13" fill="#37474f">Fig. 6 — PSU board placement (perfboard) &#183; rev A</text>
  <text x="916" y="828" font-size="13" fill="#37474f">2026-07-03 &#183; LABBOOK Phase B</text>
</svg>
