<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 950" font-family="Helvetica, Arial, sans-serif">
  <style>
    text{font-family:Helvetica,Arial,sans-serif;fill:#1a1a1a}
    .net{font-size:13px;font-weight:700;fill:#7a4a1f;letter-spacing:0.5px}
    .ref{font-size:12px;font-weight:700;fill:#0d47a1}
    .note{font-size:13px;fill:#455a64}
    .ttl{font-size:23px;font-weight:700;fill:#123a5f}
    .warn{font-size:13px;font-weight:700;fill:#b71c1c}
    .cu{fill:#eac9a2;stroke:#b98a5a;stroke-width:1.5}
    .ghost{fill:none;stroke:#1565c0;stroke-width:1.5;stroke-dasharray:5 4}
    .dim{stroke:#78909c;stroke-width:1.3}
  </style>
  <defs>
    <g id="pad"><circle r="7" fill="#5d4037"/><circle r="2.6" fill="#fff"/></g>
    <g id="padL"><circle r="10" fill="#5d4037"/><circle r="3.4" fill="#fff"/></g>
    <marker id="ad9" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,4 L8,4 M4,0 L4,8" stroke="#78909c"/></marker>
  </defs>
  <rect width="1340" height="950" fill="#fff"/>
  <text x="60" y="44" class="ttl">Fig. 9 — Channel Board, isolation-milling plan (single-sided FR4)</text>
  <text x="60" y="67" class="note">Viewed from the COMPONENT side (x-ray through the board) — MIRROR when generating toolpaths. White = milled gap (&#8805;0.4 mm). Copper islands = nets. Component bodies ghosted blue.</text>
  <text x="60" y="86" class="warn">This is a placement-true plan, not a Gerber: verify pad pitches against your actual parts before cutting. Drill 1.0 mm (1.3 mm at wire pads).</text>

  <path class="dim" d="M120,124 H920" marker-start="url(#ad9)" marker-end="url(#ad9)"/>
  <text x="520" y="118" class="note" text-anchor="middle">100 mm</text>
  <path class="dim" d="M104,150 V710" marker-start="url(#ad9)" marker-end="url(#ad9)"/>
  <text x="96" y="430" class="note" text-anchor="end" transform="rotate(-90 96 430)">70 mm</text>

  <!-- board outline -->
  <rect x="120" y="150" width="800" height="560" rx="4" fill="#fefcf9" stroke="#37474f" stroke-width="2.5"/>

  <!-- ============ COPPER ISLANDS ============ -->
  <!-- 1 RAIL top strip -->
  <rect class="cu" x="130" y="162" width="780" height="70" rx="6"/>
  <text x="440" y="185" class="net">RAIL (+22.3 V)</text>
  <!-- 2 GND: pocket + left column + mid arm + bottom strip -->
  <path class="cu" d="M130,244 H320 V300 H196 V520 H560 V590 H196 V646 H910 V700 H130 Z"/>
  <text x="150" y="680" class="net">GND (leaves board ONLY at PGND)</text>
  <text x="210" y="558" class="net" font-size="11.5">GND</text>
  <!-- 3 IN -->
  <rect class="cu" x="212" y="380" width="58" height="50" rx="6"/>
  <!-- 4 G1 -->
  <rect class="cu" x="285" y="370" width="135" height="100" rx="6"/>
  <text x="330" y="425" class="net" font-size="11.5">G1</text>
  <!-- 5 G1GATE -->
  <rect class="cu" x="470" y="370" width="70" height="60" rx="6"/>
  <!-- 6 VBIAS2 (with milled notch for RVBOT) -->
  <path class="cu" fill-rule="evenodd" d="M560,250 H770 V420 H560 Z M628,322 H704 V382 H628 Z"/>
  <text x="568" y="372" class="net" font-size="11.5">VBIAS2</text>
  <!-- 7 RVBOT -->
  <rect class="cu" x="636" y="330" width="60" height="44" rx="6"/>
  <!-- 8 G2 -->
  <rect class="cu" x="800" y="250" width="80" height="66" rx="6"/>
  <!-- 9 S2 -->
  <rect class="cu" x="800" y="330" width="80" height="62" rx="6"/>
  <!-- 10 OUT + arm (one island) -->
  <path class="cu" d="M480,435 H740 V430 H880 V520 H740 V615 H480 Z"/>
  <text x="540" y="520" class="net">OUT_NODE</text>
  <!-- 11 S1 -->
  <rect class="cu" x="760" y="540" width="120" height="75" rx="6"/>
  <!-- 12 ZX -->
  <rect class="cu" x="530" y="618" width="86" height="24" rx="6"/>

  <!-- ============ PADS ============ -->
  <use href="#padL" x="160" y="200"/><text x="160" y="252" class="ref" text-anchor="middle">RAIL in</text>
  <use href="#pad" x="600" y="200"/>
  <use href="#pad" x="240" y="212"/><use href="#pad" x="240" y="262"/>
  <use href="#pad" x="300" y="212"/><use href="#pad" x="300" y="262"/>
  <use href="#padL" x="880" y="200"/><text x="880" y="252" class="ref" text-anchor="middle">D2 fly</text>
  <use href="#padL" x="160" y="480"/><text x="160" y="460" class="ref" text-anchor="middle">SGND</text>
  <use href="#padL" x="225" y="405"/><text x="225" y="447" class="ref" text-anchor="middle">IN</text>
  <use href="#pad" x="255" y="405"/><use href="#pad" x="295" y="405"/>
  <use href="#pad" x="400" y="395"/><use href="#pad" x="500" y="395"/>
  <use href="#pad" x="400" y="445"/><use href="#pad" x="500" y="445"/>
  <use href="#pad" x="330" y="445"/><use href="#pad" x="330" y="545"/>
  <use href="#padL" x="518" y="408"/><text x="518" y="360" class="ref" text-anchor="middle">G1 fly</text>
  <use href="#pad" x="600" y="268"/>
  <use href="#pad" x="660" y="310"/><use href="#pad" x="654" y="345"/><use href="#pad" x="678" y="345"/>
  <use href="#pad" x="666" y="360"/><use href="#pad" x="666" y="452"/>
  <use href="#pad" x="720" y="408"/><use href="#pad" x="720" y="446"/>
  <use href="#pad" x="620" y="408"/><use href="#pad" x="620" y="446"/>
  <use href="#pad" x="750" y="285"/><use href="#pad" x="820" y="285"/>
  <use href="#padL" x="852" y="285"/><text x="898" y="290" class="ref">G2 fly</text>
  <use href="#padL" x="852" y="352"/><text x="898" y="357" class="ref">S2 fly</text>
  <use href="#pad" x="820" y="378"/><use href="#pad" x="820" y="452"/>
  <use href="#padL" x="852" y="480"/><text x="898" y="484" class="ref">D1 fly</text>
  <use href="#padL" x="850" y="572"/><text x="898" y="576" class="ref">S1 fly</text>
  <use href="#pad" x="790" y="562"/><use href="#pad" x="790" y="662"/>
  <use href="#pad" x="560" y="560"/><use href="#pad" x="560" y="630"/>
  <use href="#pad" x="592" y="630"/><use href="#pad" x="592" y="668"/>
  <use href="#padL" x="700" y="590"/><text x="700" y="562" class="ref" text-anchor="middle">C_out +</text>
  <use href="#padL" x="880" y="672"/><text x="880" y="642" class="ref" text-anchor="middle">PGND</text>
  <use href="#pad" x="700" y="480"/><text x="722" y="472" class="ref">TP3</text>
  <use href="#pad" x="822" y="588"/><text x="812" y="606" class="ref">TP4</text>
  <use href="#pad" x="680" y="200"/><text x="700" y="188" class="ref">TP1</text>
  <use href="#pad" x="620" y="300"/><text x="600" y="322" class="ref" text-anchor="end">TP2</text>

  <!-- ============ COMPONENT GHOSTS ============ -->
  <rect class="ghost" x="222" y="196" width="36" height="80" rx="5"/><text x="196" y="300" class="ref">C_rail</text>
  <rect class="ghost" x="286" y="200" width="28" height="74" rx="4"/><text x="286" y="292" class="ref">byp</text>
  <rect class="ghost" x="586" y="214" width="28" height="66" rx="10"/><text x="548" y="240" class="ref" text-anchor="end">Rb_top</text>
  <rect class="ghost" x="240" y="392" width="70" height="26" rx="10"/><text x="252" y="384" class="ref">C_in</text>
  <rect class="ghost" x="420" y="382" width="60" height="26" rx="10"/><text x="428" y="378" class="ref">R_gs</text>
  <rect class="ghost" x="420" y="432" width="60" height="26" rx="10"/><text x="424" y="478" class="ref">R_fb</text>
  <rect class="ghost" x="316" y="458" width="28" height="74" rx="10"/><text x="290" y="510" class="ref">R_in</text>
  <rect class="ghost" x="632" y="296" width="56" height="40" rx="4"/><text x="700" y="322" class="ref">RV</text>
  <rect class="ghost" x="652" y="372" width="28" height="68" rx="10"/><text x="644" y="400" class="ref" text-anchor="end">Rb_bot</text>
  <circle class="ghost" cx="720" cy="427" r="30"/><text x="744" y="392" class="ref">Cb_filt</text>
  <rect class="ghost" x="606" y="414" width="28" height="26" rx="4"/><text x="588" y="440" class="ref" text-anchor="end">Cb_byp</text>
  <rect class="ghost" x="756" y="272" width="70" height="26" rx="10"/><text x="762" y="264" class="ref">R_g2</text>
  <rect class="ghost" x="806" y="392" width="28" height="84" rx="10"/><text x="792" y="428" class="ref" text-anchor="end">R_s2</text>
  <rect class="ghost" x="776" y="576" width="28" height="112" rx="10"/><text x="758" y="640" class="ref" text-anchor="end">R_s1</text>
  <rect class="ghost" x="546" y="574" width="28" height="82" rx="10"/><text x="522" y="600" class="ref" text-anchor="end">R_z</text>
  <rect class="ghost" x="578" y="636" width="28" height="46" rx="4"/><text x="616" y="660" class="ref">C_z</text>

  <!-- notes -->
  <rect x="60" y="742" width="1220" height="130" rx="9" fill="#f5f7fa" stroke="#b0bec5"/>
  <text x="76" y="768" class="note"><tspan font-weight="700">Milling notes:</tspan> &#9312; 12 islands total — after milling, buzz out EVERY neighbouring pair for isolation before stuffing &#9313; the OUT and RAIL islands carry 1.4 A: leave them as drawn (wide pours),</text>
  <text x="76" y="788" class="note">never &#8220;optimize&#8221; them into traces &#9314; fly pads (large) take the FET leads and off-board wiring — drill 1.3 mm &#9315; power resistors (R_s1/R_s2/R_z) mount 2 mm proud on formed leads</text>
  <text x="76" y="808" class="note">&#9316; trimmer RV: pin 1 &#8594; VBIAS2 island, pins 2+3 &#8594; RVBOT island (check your 3296 pin style!) &#9317; Cb_filt polarity: (+) on VBIAS2, (&#8722;) on OUT — it sits across two islands</text>
  <text x="76" y="828" class="note">&#9318; islands and pitches match the rev A values incl. Rb_bot select — a different Rb_bot value fits the same pads &#9319; TP1&#8211;TP4: solder a wire loop into each pad</text>
  <text x="76" y="852" class="warn">Nets, clockwise from top-left: RAIL &#183; G2 &#183; S2 &#183; OUT(+arm) &#183; S1 &#183; PGND/GND &#183; ZX &#183; IN &#183; G1 &#183; G1GATE &#183; VBIAS2 &#183; RVBOT — cross-check each against Fig. 2 before power.</text>

  <!-- title block -->
  <rect x="60" y="886" width="1220" height="34" fill="#fff" stroke="#37474f" stroke-width="1.6"/>
  <path d="M420,886 V920 M900,886 V920" stroke="#37474f" stroke-width="1.2"/>
  <text x="76" y="908" font-size="14" font-weight="700" fill="#123a5f">SONUS MINIMAL</text>
  <text x="436" y="908" font-size="13" fill="#37474f">Fig. 9 — Channel board milling plan (single-sided) &#183; rev A</text>
  <text x="916" y="908" font-size="13" fill="#37474f">2026-07-03 &#183; LABBOOK App. E</text>
</svg>
