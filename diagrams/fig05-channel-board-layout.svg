<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 910" font-family="Helvetica, Arial, sans-serif">
  <style>
    text{font-family:Helvetica,Arial,sans-serif;fill:#1a1a1a}
    .ref{font-weight:700;font-size:14.5px;fill:#0d47a1}
    .val{font-size:12.5px;fill:#37474f}
    .note{font-size:13px;fill:#455a64}
    .zone{font-size:13px;font-weight:700;fill:#78909c;letter-spacing:1px}
    .ttl{font-size:23px;font-weight:700;fill:#123a5f}
    .warn{font-size:13px;font-weight:700;fill:#b71c1c}
    .pad{fill:#fff;stroke:#212121;stroke-width:2}
    .tp{fill:#fff8f0;stroke:#e65100;stroke-width:2}
    .cmp{fill:#ffffff;stroke:#37474f;stroke-width:1.8}
    .dim{stroke:#78909c;stroke-width:1.3}
    .fly{stroke:#6a1b9a;stroke-width:1.8;stroke-dasharray:7 5;fill:none}
  </style>
  <defs>
    <pattern id="pb" width="20.32" height="20.32" patternUnits="userSpaceOnUse"><circle cx="10" cy="10" r="1.4" fill="#c8d2d8"/></pattern>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2e7d32"/></marker>
    <marker id="ad" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto"><path d="M0,4 L8,4 M4,0 L4,8" stroke="#78909c"/></marker>
  </defs>
  <rect width="1340" height="910" fill="#fff"/>
  <text x="60" y="44" class="ttl">Fig. 5 — Channel Board, perfboard placement map (build two per amp)</text>
  <text x="60" y="67" class="note">100 &#215; 70 mm, 0.1&#8243; perfboard (BusBoard PAD-1 or similar). Placement + zones here; connectivity comes from Fig. 2. Wire point-to-point with bus wire underneath.</text>

  <!-- dimensions -->
  <path class="dim" d="M120,132 H920" marker-start="url(#ad)" marker-end="url(#ad)"/>
  <text x="520" y="126" class="note" text-anchor="middle">100 mm</text>
  <path class="dim" d="M104,150 V710" marker-start="url(#ad)" marker-end="url(#ad)"/>
  <text x="96" y="435" class="note" text-anchor="end" transform="rotate(-90 96 435)">70 mm</text>

  <!-- board -->
  <rect x="120" y="150" width="800" height="560" rx="6" fill="#fbfcfd" stroke="#37474f" stroke-width="2.5"/>
  <rect x="120" y="150" width="800" height="560" rx="6" fill="url(#pb)"/>

  <!-- zones -->
  <rect x="640" y="160" width="270" height="145" rx="8" fill="#fdf3ec" opacity="0.85"/>
  <text x="652" y="180" class="zone">POWER ENTRY</text>
  <rect x="380" y="160" width="250" height="280" rx="8" fill="#f3eefb" opacity="0.85"/>
  <text x="392" y="180" class="zone">BIAS</text>
  <rect x="130" y="430" width="300" height="270" rx="8" fill="#eef4fb" opacity="0.9"/>
  <text x="142" y="450" class="zone">INPUT — keep quiet</text>
  <rect x="640" y="315" width="270" height="230" rx="8" fill="#eff7ef" opacity="0.9"/>
  <text x="652" y="335" class="zone">SENSE / OUTPUT</text>

  <!-- POWER zone parts -->
  <circle class="pad" cx="680" cy="210" r="8"/><text x="680" y="196" class="ref" text-anchor="middle">RAIL</text>
  <circle class="cmp" cx="770" cy="240" r="42"/><text x="770" y="236" class="ref" text-anchor="middle">C_rail</text><text x="770" y="252" class="val" text-anchor="middle">470 &#181;F</text>
  <text x="770" y="292" class="val" text-anchor="middle">(&#8722;) stripe faces GND spine</text>
  <rect class="cmp" x="838" y="212" width="26" height="44" rx="3"/><text x="851" y="272" class="val" text-anchor="middle">C_rail_byp</text>
  <circle class="tp" cx="720" cy="210" r="6"/><text x="720" y="194" class="val" text-anchor="middle" fill="#e65100">TP1</text>

  <!-- BIAS zone parts -->
  <rect class="cmp" x="410" y="200" width="24" height="64" rx="3"/><text x="446" y="222" class="ref">Rb_top</text><text x="446" y="238" class="val">47 k</text>
  <rect class="cmp" x="410" y="290" width="24" height="64" rx="3"/><text x="446" y="312" class="ref">Rb_bot</text><text x="446" y="328" class="val">22 k*</text>
  <rect class="cmp" x="520" y="196" width="76" height="40" rx="4"/>
  <circle cx="536" cy="216" r="8" fill="none" stroke="#37474f" stroke-width="1.6"/><path d="M530,216 h12 M536,210 v12" stroke="#37474f" stroke-width="1.4"/>
  <text x="602" y="212" class="ref">RV_bias</text><text x="602" y="228" class="val">10 k 25T</text>
  <text x="520" y="252" class="warn">adjuster screw faces UP</text>
  <circle class="cmp" cx="560" cy="310" r="28"/><text x="560" y="306" class="ref" text-anchor="middle">Cb_filt</text><text x="560" y="322" class="val" text-anchor="middle">100 &#181;F</text>
  <rect class="cmp" x="536" y="366" width="48" height="24" rx="3"/><text x="596" y="382" class="val">Cb_byp 1 &#181;F</text>
  <circle class="tp" cx="490" cy="290" r="6"/><text x="490" y="278" class="val" text-anchor="middle" fill="#e65100">TP2</text>

  <!-- INPUT zone parts -->
  <circle class="pad" cx="150" cy="490" r="8"/><text x="142" y="474" class="ref" text-anchor="end">IN</text>
  <circle class="pad" cx="150" cy="560" r="8"/><text x="142" y="586" class="ref" text-anchor="end">SGND</text>
  <rect class="cmp" x="190" y="478" width="56" height="26" rx="3"/><text x="218" y="522" class="val" text-anchor="middle">C_in 2.2 &#181;F</text>
  <rect class="cmp" x="280" y="480" width="60" height="20" rx="3"/><text x="310" y="518" class="val" text-anchor="middle">R_gs 220</text>
  <rect class="cmp" x="240" y="600" width="60" height="20" rx="3"/><text x="270" y="638" class="val" text-anchor="middle">R_in 47 k</text>
  <rect class="cmp" x="330" y="560" width="60" height="20" rx="3"/><text x="360" y="598" class="val" text-anchor="middle">R_fb 82 k</text>
  <text x="142" y="674" class="note">input pair (IN + SGND) arrives as a</text>
  <text x="142" y="690" class="note">twisted pair from the RCA — Fig. 7</text>

  <!-- SENSE/OUTPUT zone -->
  <rect class="cmp" x="660" y="350" width="84" height="30" rx="4"/><text x="756" y="364" class="ref">R_s2</text><text x="756" y="380" class="val">0.47 &#937; 3 W</text>
  <rect class="cmp" x="660" y="400" width="84" height="30" rx="4"/><text x="756" y="414" class="ref">R_s1</text><text x="756" y="430" class="val">0.47 &#937; 3 W</text>
  <text x="660" y="524" class="warn">R_s1 / R_s2: mount 2 mm proud</text>
  <text x="660" y="540" class="warn">of the board — they run warm</text>
  <rect class="cmp" x="660" y="470" width="60" height="20" rx="3"/><text x="690" y="506" class="val" text-anchor="middle">R_z 10 &#937;</text>
  <rect class="cmp" x="756" y="468" width="48" height="24" rx="3"/><text x="780" y="508" class="val" text-anchor="middle">C_z 100 nF</text>
  <circle class="tp" cx="840" cy="410" r="6"/><text x="840" y="432" class="val" text-anchor="middle" fill="#e65100">TP4</text>
  <circle class="tp" cx="840" cy="368" r="6"/><text x="840" y="356" class="val" text-anchor="middle" fill="#e65100">TP3</text>

  <!-- FET pads on right edge -->
  <g>
    <circle class="pad" cx="897" cy="210" r="8"/><text x="878" y="214" class="ref" text-anchor="end">D2</text>
    <circle class="pad" cx="897" cy="258" r="8"/><text x="878" y="262" class="ref" text-anchor="end">G2</text>
    <circle class="pad" cx="897" cy="306" r="8"/><text x="878" y="310" class="ref" text-anchor="end">S2</text>
    <circle class="pad" cx="897" cy="400" r="8"/><text x="878" y="404" class="ref" text-anchor="end">D1</text>
    <circle class="pad" cx="897" cy="448" r="8"/><text x="878" y="452" class="ref" text-anchor="end">G1</text>
    <circle class="pad" cx="897" cy="496" r="8"/><text x="878" y="500" class="ref" text-anchor="end">S1</text>
    <circle class="pad" cx="897" cy="580" r="8"/><text x="878" y="584" class="ref" text-anchor="end">OUT</text>
    <circle class="pad" cx="897" cy="646" r="8"/><text x="878" y="650" class="ref" text-anchor="end">PGND</text>
  </g>

  <!-- GND spine -->
  <path d="M160,660 H860 L889,646" stroke="#2e7d32" stroke-width="4" fill="none" opacity="0.75"/>
  <path d="M150,568 V652" stroke="#2e7d32" stroke-width="2.2" opacity="0.75" marker-end="url(#ag)"/>
  <text x="420" y="682" class="note" fill="#1b5e20" font-weight="700">GND spine — one piece of 0.8 mm bus wire; everything returns to it, it leaves ONLY at PGND</text>

  <!-- FETs + heatsink -->
  <rect x="1112" y="160" width="52" height="380" fill="#eceff1" stroke="#78909c" stroke-width="2"/>
  <path d="M1164,170 h14 M1164,205 h14 M1164,240 h14 M1164,275 h14 M1164,310 h14 M1164,345 h14 M1164,380 h14 M1164,415 h14 M1164,450 h14 M1164,485 h14 M1164,520 h14" stroke="#78909c" stroke-width="5"/>
  <text x="1138" y="570" class="note" text-anchor="middle">HEATSINK</text>
  <text x="1138" y="586" class="note" text-anchor="middle">(Fig. 7)</text>
  <g>
    <rect x="1010" y="196" width="66" height="92" rx="4" fill="#fff" stroke="#37474f" stroke-width="2"/>
    <circle cx="1043" cy="216" r="7" fill="none" stroke="#37474f" stroke-width="1.6"/>
    <text x="1043" y="252" class="ref" text-anchor="middle">Q2</text>
    <text x="1043" y="268" class="val" text-anchor="middle">TO-247</text>
    <path class="fly" d="M905,210 C955,210 965,240 1006,240"/>
    <path class="fly" d="M905,258 C950,258 962,216 1006,214"/>
    <path class="fly" d="M905,306 C960,306 975,266 1006,266"/>
    <text x="948" y="196" class="val" fill="#6a1b9a">pins: G / D / S</text>
  </g>
  <g>
    <rect x="1010" y="386" width="66" height="92" rx="4" fill="#fff" stroke="#37474f" stroke-width="2"/>
    <circle cx="1043" cy="406" r="7" fill="none" stroke="#37474f" stroke-width="1.6"/>
    <text x="1043" y="442" class="ref" text-anchor="middle">Q1</text>
    <text x="1043" y="458" class="val" text-anchor="middle">TO-247</text>
    <path class="fly" d="M905,400 C955,400 965,430 1006,430"/>
    <path class="fly" d="M905,448 C950,448 962,406 1006,404"/>
    <path class="fly" d="M905,496 C960,496 975,456 1006,456"/>
  </g>
  <text x="960" y="530" class="warn">flying leads &#8804;60 mm;</text>
  <text x="960" y="546" class="warn">twist each G with its S</text>
  <text x="1000" y="330" class="note">pin order on TO-247,</text>
  <text x="1000" y="346" class="note">facing the printing:</text>
  <text x="1000" y="362" class="note" font-weight="700">1=G &#183; 2=D(tab) &#183; 3=S</text>

  <!-- C_out off board -->
  <circle cx="1040" cy="680" r="56" fill="none" stroke="#37474f" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="1040" y="672" class="ref" text-anchor="middle">C_out</text>
  <text x="1040" y="688" class="val" text-anchor="middle">10,000 &#181;F</text>
  <text x="1040" y="704" class="val" text-anchor="middle">+ 1 &#181;F byp</text>
  <path class="fly" d="M905,580 C950,580 970,630 986,650"/>
  <text x="1040" y="760" class="note" text-anchor="middle">off-board — clamp to chassis floor,</text>
  <text x="1040" y="776" class="note" text-anchor="middle">(+) toward the board (Fig. 7)</text>

  <!-- rules box -->
  <rect x="60" y="796" width="1220" height="66" rx="9" fill="#f5f7fa" stroke="#b0bec5"/>
  <text x="76" y="820" class="note"><tspan font-weight="700">Rules:</tspan> &#9312; the 1.4 A path (RAIL&#8594;D2 &#183; S2&#8594;OUT &#183; D1&#8594;OUT &#183; S1&#8594;spine) is bus wire, never thin hookup wire &#9313; Rb_bot* is selected in Phase A (Table 4.3) &#9314; Cb_filt (+) faces TP2, its (&#8722;) goes to OUT &#8212; not to the spine</text>
  <text x="76" y="842" class="note">&#9315; nothing from the INPUT zone touches the spine except at the single SGND&#8594;spine tie shown &#9316; leave TP1&#8211;TP4 as wire loops you can clip a probe to &#9317; R_fb runs OUT&#8594;input zone along the board edge</text>

  <!-- title block -->
  <rect x="60" y="870" width="1220" height="34" fill="#fff" stroke="#37474f" stroke-width="1.6"/>
  <path d="M420,870 V904 M900,870 V904" stroke="#37474f" stroke-width="1.2"/>
  <text x="76" y="892" font-size="14" font-weight="700" fill="#123a5f">SONUS MINIMAL</text>
  <text x="436" y="892" font-size="13" fill="#37474f">Fig. 5 — Channel board placement (perfboard) &#183; rev A</text>
  <text x="916" y="892" font-size="13" fill="#37474f">2026-07-03 &#183; LABBOOK Phase C</text>
</svg>
